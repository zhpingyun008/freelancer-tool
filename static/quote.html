<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 报价生成 - 自由职业者工具</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">✍ 自由职业者工具</a>
            <div class="nav-links">
                <a href="/generate-contract">生成合同</a>
                <a href="/generate-quote">生成报价</a>
                <a href="/docs" target="_blank">API文档</a>
            </div>
        </div>
    </nav>

    <main class="page-main">
        <div class="container">
            <h1>💰 AI 报价生成器</h1>
            <p class="page-desc">输入服务描述和报价金额，AI 将为你生成正式、专业的报价单。</p>

            <div class="form-layout">
                <div class="form-card">
                    <form id="quoteForm">
                        <div class="form-group">
                            <label for="service_description">服务描述 *</label>
                            <textarea id="service_description" rows="4" placeholder="详细描述你提供的服务内容，例如：网站UI设计（含首页、产品页、关于页共5个页面，提供Figma源文件）" required></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="amount">报价金额 *</label>
                                <input type="number" id="amount" step="0.01" min="0" placeholder="例如: 5000" required>
                            </div>
                            <div class="form-group">
                                <label for="currency">货币</label>
                                <select id="currency">
                                    <option value="CNY">CNY (¥)</option>
                                    <option value="USD">USD ($)</option>
                                    <option value="EUR">EUR (€)</option>
                                </select>
                            </div>
                        </div>

                        <div class="usage-info" id="usageInfo">
                            <span>本月已使用: <strong id="usageCount">0</strong> / <strong id="usageLimit">3</strong> 次</span>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
                            <span id="btnText">🤖 生成报价</span>
                            <span id="btnLoading" class="hidden">⏳ 正在生成...</span>
                        </button>
                    </form>
                </div>

                <div class="result-card hidden" id="resultCard">
                    <div class="result-header">
                        <h2>📋 生成的报价单</h2>
                        <div class="result-actions">
                            <button class="btn btn-small" onclick="copyResult()">📋 复制</button>
                            <button class="btn btn-small" onclick="downloadResult()">⬇ 下载</button>
                        </div>
                    </div>
                    <div class="result-content" id="resultContent"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 自由职业者工具 - Freelancer Tool. All rights reserved.</p>
        </div>
    </footer>

    <div id="toast" class="toast hidden"></div>

    <script>
        fetch('/api/usage')
            .then(r => r.json())
            .then(d => {
                document.getElementById('usageCount').textContent = d.usage;
                document.getElementById('usageLimit').textContent = d.limit;
            });

        document.getElementById('quoteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            const resultCard = document.getElementById('resultCard');
            const resultContent = document.getElementById('resultContent');

            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const resp = await fetch('/api/generate-quote', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        service_description: document.getElementById('service_description').value,
                        amount: parseFloat(document.getElementById('amount').value),
                        currency: document.getElementById('currency').value,
                    }),
                });
                const data = await resp.json();

                if (!resp.ok) {
                    if (data.error === 'free_limit_reached') {
                        showToast('❌ ' + data.message, 'error');
                    } else {
                        showToast('❌ 生成失败: ' + (data.detail || '未知错误'), 'error');
                    }
                    return;
                }

                resultContent.textContent = data.content;
                resultCard.classList.remove('hidden');
                document.getElementById('usageCount').textContent = data.usage;
                showToast('✅ 报价生成成功！', 'success');
            } catch (err) {
                showToast('❌ 网络错误: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });

        function copyResult() {
            const text = document.getElementById('resultContent').textContent;
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 已复制到剪贴板', 'success');
            });
        }

        function downloadResult() {
            const text = document.getElementById('resultContent').textContent;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '报价单_' + new Date().toISOString().slice(0, 10) + '.txt';
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('✅ 下载成功', 'success');
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }
    </script>
</body>
</html>
